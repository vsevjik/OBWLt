name: Парсер VLESS конфигов

on:
  workflow_dispatch:  # Только ручной запуск для теста


jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
      
      - name: Проверка файлов
        run: |
          echo "=== СОДЕРЖИМОЕ ДИРЕКТОРИИ ==="
          ls -la
          echo "=== СОДЕРЖИМОЕ sources.txt (если есть) ==="
          cat sources.txt 2>/dev/null || echo "sources.txt не найден"
      
      - name: Запуск с отладкой
        run: |
          python -u parser.py 2>&1 | tee debug_output.txt
      
      - name: Сохранение логов
        if: always()
        run: |
          echo "=== DEBUG OUTPUT ==="
          cat debug_output.txt 2>/dev/null || echo "Нет логов"
